name: bundle-tests
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  bundle-test:
    name: ${{ matrix.os }}-${{ matrix.action }}-${{ matrix.tool }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, runner: windows-latest, tool: multipar,     action: verify, script: ./scripts/bundle-windows-verify-multipar-latest.ps1 }
          - { os: windows, runner: windows-latest, tool: multipar,     action: repair, script: ./scripts/bundle-windows-repair-multipar-latest.ps1 }
          - { os: windows, runner: windows-latest, tool: par2cmdline,  action: verify, script: ./scripts/bundle-windows-verify-par2cmdline-latest.ps1 }
          - { os: windows, runner: windows-latest, tool: par2cmdline,  action: repair, script: ./scripts/bundle-windows-repair-par2cmdline-latest.ps1 }
          - { os: linux,   runner: ubuntu-latest,  tool: par2cmdline,  action: verify, script: ./scripts/bundle-linux-verify-par2cmdline-latest.sh }
          - { os: linux,   runner: ubuntu-latest,  tool: par2cmdline,  action: repair, script: ./scripts/bundle-linux-repair-par2cmdline-latest.sh }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Run ${{ matrix.action }} with ${{ matrix.tool }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.script }}
