version: 2

project_name: par2cron

before:
  hooks:
    - make clean
    - make vendor
    - make lint
    - make test

builds:
  - id: par2cron
    main: ./cmd/par2cron
    binary: par2cron
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=vendor
    flags:
      - -trimpath
    ldflags:
      - -w
      - -s
      - -X github.com/desertwitch/par2cron/internal/schema.ProgramVersion={{.Version}}
      - -buildid=
    goos:
      - linux
    goarch:
    - amd64
    - arm
    - arm64
    - 386

source:
  enabled: true

archives:
  -
    files:
      - QUICKGUIDE
      - LICENSE
      - par2cron.yaml

signs:
  - artifacts: checksum

release:
  draft: true
  footer: |
    ---
    **Thank you for choosing par2cron to protect your valuable data.** :yellow_heart:
    Most users will want the `linux_amd64` package (see installation instructions in `QUICKGUIDE`).
    <br><img alt="Release footer" src="https://raw.githubusercontent.com/desertwitch/par2cron/refs/heads/main/assets/release_footer.png" width="400">

changelog:
  use: github
  sort: asc
  filters:
    exclude:
    - "^Merge"
  groups:
    - title: 'New features'
      regexp: '^.*?feat[\(:]'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix[\(:]'
      order: 10
    - title: 'Other work'
      order: 999
