version: 2

project_name: par2cron

before:
  hooks:
    - make clean
    - make vendor
    - make lint
    - make test

builds:
  - id: par2cron
    main: ./cmd/par2cron
    binary: par2cron
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=vendor
    flags:
      - -trimpath
    ldflags:
      - -w
      - -s
      - -X github.com/desertwitch/par2cron/internal/schema.ProgramVersion={{.Version}}
      - -buildid=
    goos:
      - linux
    goarch:
    - amd64
    - arm
    - arm64
    - 386

source:
  enabled: true

archives:
  -
    files:
      - QUICKGUIDE
      - LICENSE
      - par2cron.yaml

signs:
  - artifacts: checksum

release:
  footer: |
    Most users will want the `linux_amd64` package (see installation instructions in `QUICKGUIDE`).  
    Do note that any release files are unattended builds and served without any warranties.

